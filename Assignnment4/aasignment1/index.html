<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theme Toggle</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Given HTML (same as instruction) -->
  <div id="app" class="day">
    <p>I am a HashedBit student, ready to become an awesome full stack developer</p>
    <button onclick="swapTheme()" id="swap" class="button_day">Toggle theme</button>
  </div>

  <script>
    function swapTheme() {
      const app = document.getElementById("app");
      const btn = document.getElementById("swap");

      if (app.className === "day") {
        app.className = "night";
        btn.className = "button_night";
      } else {
        app.className = "day";
        btn.className = "button_day";
      }
    }
  </script>

</body>
</html>
